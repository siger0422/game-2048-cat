    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    />

    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript
      ><iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-KZKHW5F5"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe
    ></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <div class="bg-deco bg-deco--left"></div>
    <div class="bg-deco bg-deco--right"></div>

    <main class="game-shell">
      <header class="top">
        <div>
          <p class="kicker">먼작귀 팬메이드</p>
          <h1>야르게임 - 우사기편</h1>
        </div>
        <div class="top-actions">
          <div class="sound-share-group">
            <button id="bgm-btn" class="btn btn--sub btn--icon" aria-pressed="false" aria-label="BGM 켜기"></button>
            <button id="share-btn" class="btn btn--share">공유하기</button>
          </div>
          <button id="new-game-btn" class="btn">새 게임</button>
        </div>
      </header>

      <section class="score-wrap">
        <div class="score-box">
          <span>점수</span>
          <strong id="score">0</strong>
        </div>
        <div class="score-box">
          <span>최고 점수</span>
          <strong id="best">0</strong>
        </div>
      </section>

      <section class="guide">
        <p>
          같은 캐릭터 블록을 합쳐 더 큰 단계로 만들어보세요!<br />
          <span>PC: 방향키 / 모바일: 스와이프</span>
        </p>
      </section>

      <section id="board" class="board" aria-label="2048 board"></section>
      <div id="fx-layer" class="fx-layer" aria-live="polite"></div>

      <section class="legend" id="legend"></section>
    </main>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-card">
        <h2 id="overlay-title">게임 종료</h2>
        <p id="overlay-text">다시 도전해볼까요?</p>
        <button id="retry-btn" class="btn">다시 시작</button>
      </div>
    </div>

    <div id="reset-confirm" class="overlay hidden">
      <div class="overlay-card">
        <h2>정말 리셋할거야..?</h2>
        <p>지금까지 진행한 기록이 초기화돼요.</p>
        <div class="confirm-actions">
          <button id="confirm-reset-btn" class="btn">응! 리셋할래</button>
          <button id="cancel-reset-btn" class="btn btn--sub">아니! 계속 할거야!</button>
        </div>
      </div>
    </div>

    <audio id="bgm-audio" loop preload="auto" playsinline webkit-playsinline>
      <source src="./bgm.m4a" type="audio/mp4" />
      <source src="./bgm.mp3" type="audio/mpeg" />
      <source src="./assets/bgm.m4a" type="audio/mp4" />
      <source src="./assets/bgm.mp3" type="audio/mpeg" />
    </audio>
    <img id="postcard-usagi-preload" src="./usagi-postcard.png" alt="" hidden />

    <script src="./app.js"></script>
  </body>
</html>
